services:
  api:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/app
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      TRUST_PROXY: ${TRUST_PROXY:-1}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      UPLOAD_MAX_BYTES: ${UPLOAD_MAX_BYTES:-5242880}
      BLOCKCHAIN_RPC_URL: ${BLOCKCHAIN_RPC_URL:-}
      TITLE_CONTRACT_ADDRESS: ${TITLE_CONTRACT_ADDRESS:-}
      MINTER_PRIVATE_KEY: ${MINTER_PRIVATE_KEY:-}
      ESCROW_CONTRACT_ADDRESS: ${ESCROW_CONTRACT_ADDRESS:-}
      ESCROW_TOKEN_ADDRESS: ${ESCROW_TOKEN_ADDRESS:-}
      SALE_ESCROW_CONTRACT_ADDRESS: ${SALE_ESCROW_CONTRACT_ADDRESS:-}
      ALLOW_MAINNET_ESCROW: ${ALLOW_MAINNET_ESCROW:-false}
      GEOCODER_PROVIDER: ${GEOCODER_PROVIDER:-mock}
      NOMINATIM_BASE_URL: ${NOMINATIM_BASE_URL:-https://nominatim.openstreetmap.org}
      NOMINATIM_USER_AGENT: ${NOMINATIM_USER_AGENT:-real-estate-marketplace/1.0}
      GEOCODER_CACHE_TTL_HOURS: ${GEOCODER_CACHE_TTL_HOURS:-720}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      MAIL_FROM: ${MAIL_FROM:-Swafri <no-reply@swafri.local>}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      PASSWORD_RESET_EXPIRES_MINUTES: ${PASSWORD_RESET_EXPIRES_MINUTES:-30}
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mongo-data:
